name: MLOps CI Pipeline with my latest mlops project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Run pytest
  # ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest flask pandas

      - name: Run tests
        run: pytest tests/ -v
        env:
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Train → Monitor → Build Docker → Deploy to ECS
  # ─────────────────────────────────────────────────────────────
  train-evaluate:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: manu7-mlops
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest flask pandas

      # ── FIX: create reports/ dir so DVC doesn't fail on pull ─────────────
      - name: Create reports directory
        run: mkdir -p reports

      - name: Pull data from DVC
        run: dvc pull --force

      # dvc repro runs: preprocess → train → evaluate → monitor
      - name: Run DVC Pipeline
        run: dvc repro
