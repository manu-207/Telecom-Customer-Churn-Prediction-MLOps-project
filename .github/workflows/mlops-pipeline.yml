name: ChurnGuard MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "params.yaml"
      - "dvc.yaml"
      - "requirements.txt"
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: "http://localhost:5000"

jobs:
  # ─── Job 1: Lint & Test ───────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=100 --ignore=E501,W503

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  # ─── Job 2: Train & Evaluate ──────────────────────────────────────────
  train:
    name: Train & Evaluate Models
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup DVC
        uses: iterative/setup-dvc@v2

      - name: Pull data with DVC
        run: |
          dvc pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Start MLflow server
        run: |
          mlflow server --host 0.0.0.0 --port 5000 &
          sleep 5

      - name: Run preprocessing
        run: python src/preprocess.py

      - name: Train models
        run: python src/train.py

      - name: Evaluate & auto-promote
        run: python src/evaluate.py

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-metrics
          path: reports/metrics.json

  # ─── Job 3: Build & Push Docker Image ─────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/churnguard:latest
            ${{ secrets.DOCKER_USERNAME }}/churnguard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: Deploy (staging) ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying ChurnGuard to staging environment..."
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/churnguard:${{ github.sha }}"
          # Add your deployment commands here:
          # kubectl set image deployment/churnguard churnguard=$IMAGE
          # or: aws ecs update-service ...
          # or: docker compose up -d
